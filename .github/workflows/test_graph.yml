name: 🧪 휴일용 그래프 테스트 봇 (수동 전용)

on:
  workflow_dispatch: # 💡 예약 알람 없이 오직 수동 버튼으로만 작동합니다!

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 저장소 파일 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 그래프 그리기에 필요한 부품 설치
      run: |
        pip install -r requirements.txt

    - name: 4. [핵심] 수집 생략하고 입체 분석기(그래프)만 단독 실행!
      run: |
        python 분석기.PY

    - name: 5. 완성된 그래프 이미지(*.png)만 깃허브에 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # 💡 원본 엑셀은 건드리지 않고 사진 파일만 올립니다!
        git add *.png
        git commit -m "📊 주말 테스트: 그래프 생성 완료!" || echo "No changes to commit"
        git push
