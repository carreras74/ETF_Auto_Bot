on:
  schedule:
    # 💡 UTC 기준 일~목 밤 21시 50분 = KST 기준 월~금 아침 6시 50분!
    - cron: '50 21 * * 0-4' 
  workflow_dispatch: 
  push:
    branches:
      - main 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Seoul

    steps:
    - name: 1. 내 저장소 파일 가져오기 (Checkout)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 💡 [보강] 과거 기록까지 다 가져와야 충돌이 안 납니다.

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 가상 모니터(Xvfb) 및 필수 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install -r requirements.txt

    - name: 4. 구글 시트 비밀키(JSON) 생성
      run: |
        cat <<EOF > google_key.json
        ${{ secrets.GCP_KEY }}
        EOF

    - name: 5. 엑셀 파일 수집기 실행 (가상 모니터 환경 탑재!)
      run: |
        xvfb-run -a python ETF_collector.py

    - name: 6. 구글 시트 일괄 변환 및 업로드 실행
      run: |
        python 일괄변환기.py

    - name: 7. Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config pull.rebase true  # 💡 [보강] 리베이스 설정을 명시적으로 고정
        git add .
        git commit -m "🤖 일일 수집 및 업로드 완료: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git pull origin main
        git push origin main
