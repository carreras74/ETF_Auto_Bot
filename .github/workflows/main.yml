on:
  schedule:
    - cron: '50 21 * * 0-4' 
  workflow_dispatch: 
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install -r requirements.txt

    - name: 4. 구글 시트 비밀키(JSON) 복원
      env:
        GCP_KEY_BASE64: ${{ secrets.GCP_KEY }}
      run: |
        # 💡 외계어를 해독해서 원본과 100% 똑같은 JSON 파일을 만듭니다.
        echo "$GCP_KEY_BASE64" | base64 --decode > google_key.json
        # (확인용) 생성된 파일의 첫 줄이 { 인지 살짝 확인 (보안상 값은 안 보임)
        head -c 1 google_key.json

    - name: 저장 (보안 강화 버전)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 💡 [필살기] 깃허브에 올리기 전에 열쇠 파일을 아예 삭제합니다!
        # 이렇게 하면 git add . 을 해도 열쇠가 안 올라갑니다.
        rm -f google_key.json
        
        git add .
        git commit -m "🤖 안정화 버전 일일 수집 완료: $(date +'%Y-%m-%d')" || exit 0
        git pull --rebase origin main
        git push origin main 
        
        git add .
        git commit -m "🤖 안정화 버전 일일 수집 완료" || exit 0
        git pull --rebase origin main
        git push origin main
