name: 아침 주도주 자동 수집 봇 (Daily 7 AM KST)

on:
  schedule:
    # 💡 UTC 기준 일~목 밤 10시 = KST 기준 월~금 아침 7시!
    - cron: '0 22 * * 0-4' 
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 저장소 파일 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 가상 모니터(Xvfb) 및 필수 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install -r requirements.txt

    - name: 4. 구글 시트 비밀키(JSON) 생성
      env:
        GCP_KEY: ${{ secrets.GCP_KEY }}
      run: |
        echo "$GCP_KEY" > google_key.json

    - name: 5. 엑셀 파일 수집기 실행 (가상 모니터 환경 탑재!)
      run: |
        xvfb-run -a python ETF_collector.py

    - name: 6. 구글 시트 일괄 변환 및 업로드 실행
      run: |
        python 일괄변환기.py

    - name: 7. 오늘 수집한 엑셀 데이터 깃허브에 영구 저장 (Commit & Push)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.xlsx *.xls *.csv
        git commit -m "🤖 일일 데이터 수집 보존 완료: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
