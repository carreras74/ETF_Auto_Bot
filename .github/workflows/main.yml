name: ETF Auto Collector

on:
  schedule:
    # 한국 시간(KST) 월,화,수,목,금 아침 7시 20분 동작
    - cron: '20 22 * * 0-4'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager pandas gspread google-auth openpyxl lxml html5lib beautifulsoup4 finance-datareader xlrd

    - name: Create google_key.json
      run: echo "${{ secrets.GOOGLE_KEY }}" > google_key.json

    - name: Run TIME & KoAct Collector
      run: python ETF_collector.py

    # 💡 [핵심 패치] 드디어 제 이름을 찾은 1군 변환기!
    - name: Run TIME & KoAct Converter 
      run: python 일괄변환기.py

    - name: Run TIGER Collector
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
      run: python TIGER_collector.py
