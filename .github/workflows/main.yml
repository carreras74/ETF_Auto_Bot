name: ETF Auto Bot Schedule

on:
  schedule:
    - cron: '20 22 * * 0-4' 
  workflow_dispatch: 
  push:
    branches: [main]

# 💡 [핵심 패치] 깃허브 서버의 시계를 한국 시간(KST)으로 강제 고정합니다!
env:
  TZ: Asia/Seoul

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 저장소 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필수 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install -r requirements.txt

    - name: 4. 구글 시트 비밀키(JSON) 복원
      env:
        GCP_KEY_BASE64: ${{ secrets.GCP_KEY }}
      run: |
        echo -n "$GCP_KEY_BASE64" | base64 --decode > google_key.json

    - name: 5. 데이터 수집 및 업로드 실행 (핵심!)
      run: |
        xvfb-run -a python ETF_collector.py
        python 일괄변환기.py

    - name: 6. 보안 정리 및 결과 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        rm -f google_key.json
        
        git add .
        git commit -m "🤖 일일 수집 및 업로드 완료: $(date +'%Y-%m-%d')" || exit 0
        git pull --rebase origin main
        git push origin main
