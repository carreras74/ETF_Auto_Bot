name: ETF Auto Collector

on:
  schedule:
    # 한국 시간(KST) 월~금 오전 7:20 실행 = UTC 전날 22:20 (일~목)
    - cron: '20 22 * * 0-4'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas gspread google-auth google-auth-oauthlib openpyxl lxml html5lib beautifulsoup4 finance-datareader xlrd

      - name: Create google_key.json
        env:
          GOOGLE_SECRET: ${{ secrets.GOOGLE_KEY }}
        run: |
          python - <<'PY'
          import os
          content = os.environ.get("GOOGLE_SECRET", "").strip()
          if content:
              with open("google_key.json", "w", encoding="utf-8") as f:
                  f.write(content)
          PY

      - name: Run TIME & KoAct Collector
        env:
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python ETF_collector.py

      - name: Run TIME & KoAct Converter
        env:
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python 일괄변환기.py

      - name: Run TIGER Collector
        env:
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python TIGER_collector.py

