name: ETF Auto Collector

on:
  schedule:
    # 한국 시간(KST) 아침 7시 20분 동작 (UTC 기준 전날 밤 10시 20분)
    - cron: '20 22 * * *'
  # GitHub 페이지에서 수동으로 버튼을 눌러서 실행할 수 있게 해주는 옵션
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager pandas gspread google-auth openpyxl lxml html5lib beautifulsoup4

    - name: Run TIME & KoAct Collector
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
      run: python ETF_collector.py

    - name: Run TIGER Collector
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
      run: python TIGER_collector.py
