name: ETF Auto Collector

on:
  schedule:
    # 💡 [트래픽 지옥 회피 패치]
    # 한국 시간(KST) 월~금 오전 8시 50분 동작
    # 🌍 UTC 기준: 일~목 오후 11시 50분 (요일이 하루씩 당겨집니다!)
    - cron: '50 23 * * 0-4'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager pandas gspread google-auth openpyxl lxml html5lib beautifulsoup4 finance-datareader xlrd

    - name: Create google_key.json
      env:
        GOOGLE_SECRET: ${{ secrets.GOOGLE_KEY }}
      run: python -c 'import os; open("google_key.json", "w", encoding="utf-8").write(os.environ.get("GOOGLE_SECRET", ""))'

    - name: Run TIME & KoAct Collector
      run: python ETF_collector.py

    - name: Run TIME & KoAct Converter 
      run: python 일괄변환기.py

    - name: Run TIGER Collector
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
      run: python TIGER_collector.py
