name: 아침 주도주 자동 수집 봇 (Daily 7:35 AM KST)

on:
  schedule:
    # 💡 UTC 기준 일~목 밤 10시 35분 = KST 기준 월~금 아침 7시 35분!
    - cron: '35 22 * * 0-4' 
  workflow_dispatch: # 수동 실행 버튼
  push:
    # 💡 코드를 덮어쓰고 저장하는 즉시 로봇이 바로 1번 강제 출동합니다!
    branches:
      - main 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # =====================================================================
    # 💡 [핵심 패치] 깃허브 서버의 시계를 '한국 시간(KST)'으로 완벽 고정!
    # =====================================================================
    env:
      TZ: Asia/Seoul

    steps:
    - name: 1. 내 저장소 파일 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 가상 모니터(Xvfb) 및 필수 패키지 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        pip install -r requirements.txt

    - name: 4. 구글 시트 비밀키(JSON) 생성
      env:
        GCP_KEY: ${{ secrets.GCP_KEY }}
      run: |
        echo "$GCP_KEY" > google_key.json

    - name: 5. 엑셀 파일 수집기 실행 (가상 모니터 환경 탑재!)
      run: |
        xvfb-run -a python ETF_collector.py

    - name: 6. 구글 시트 일괄 변환 및 업로드 실행
      run: |
        python 일괄변환기.py

    - name: 7. 매입 종목 입체 분석 그래프 생성
      run: |
        python 분석기.py

    - name: 8. 수집 데이터 및 분석 그래프 깃허브 영구 저장 (Commit & Push)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.xlsx *.xls *.png *.csv
        git commit -m "🤖 일일 수집 및 분석 완료: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
