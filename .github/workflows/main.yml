name: ETF Auto Collector

on:
  schedule:
    # 한국 시간(KST) 월,화,수,목,금 아침 7시 20분 동작
    - cron: '20 22 * * 0-4'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 💡 변환기에 필요한 finance-datareader, xlrd 부품 추가!
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager pandas gspread google-auth openpyxl lxml html5lib beautifulsoup4 finance-datareader xlrd

    # 💡 [핵심 패치] 변환기 코드가 읽을 수 있도록 가짜 google_key.json 파일을 1초 만에 생성!
    - name: Create google_key.json
      run: echo "${{ secrets.GOOGLE_KEY }}" > google_key.json

    - name: Run TIME & KoAct Collector
      run: python ETF_collector.py

    # 💡 [주의] 아래 실행 파일 이름이 올려주신 변환기 파일 이름과 맞는지 꼭 확인하세요!
    # 만약 깃허브에 있는 파일 이름이 다르면 'ETF_변환기.py' 부분을 그 이름으로 바꿔주세요.
    - name: Run TIME & KoAct Converter 
      run: python ETF_변환기.py

    - name: Run TIGER Collector
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
      run: python TIGER_collector.py
